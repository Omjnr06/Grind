name: leetcode-enrich

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: leetcode-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enrich LeetCode tracker
        working-directory: internship-alerts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          LEETCODE_DB_ID: ${{ secrets.LEETCODE_DB_ID }}
        run: python leetcode_enrich.py